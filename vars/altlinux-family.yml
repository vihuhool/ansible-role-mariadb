---
# Package installation related variables (ALT Linux)
_mariadb_dependency_package_candidates:
  - python3-module-pymysql
  - python3-pymysql
  - python3-module-PyMySQL

_mariadb_packages:
  - mariadb-server
  - mariadb-client

# General configuration (ALT Linux)
_mariadb_default_config_datadir: /etc
_mariadb_default_config_file: "{{ _mariadb_default_config_datadir }}/my.cnf"
_mariadb_default_config_included_dirs: [/etc/my.cnf.d]
_mariadb_config_datadir: >-
  {{ mariadb_config_datadir | default(_mariadb_default_config_datadir, true) }}
_mariadb_config_file: >-
  {{ mariadb_config_file | default(_mariadb_config_datadir +
  '/my.cnf.d/99-ansible-role-mariadb-my.cnf', true) }}
_mariadb_config_include_dir: >-
  {{ mariadb_config_include_dir | default(_mariadb_config_datadir +
  '/my.cnf.d', true) }}
_mariadb_socket: >-
  {{ mariadb_socket | default('/var/lib/mysql/mysql.sock', true) }}
_mariadb_pid_file: >-
  {{ mariadb_pid_file | default('/var/lib/mysql/mariadb.pid', true) }}
_mariadb_daemon: "{{ mariadb_daemon | default('mariadb', true) }}"

# Logging related variables
_mariadb_syslog_tag: "{{ mariadb_syslog_tag | default('mariadb', true) }}"
