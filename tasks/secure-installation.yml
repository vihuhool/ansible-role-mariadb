---
- name: "Ensure MariaDB daemon is started"
  ansible.builtin.service:
    name: "{{ _mariadb_daemon }}"
    state: started

- name: Set default root login password fact
  ansible.builtin.set_fact:
    _mariadb_root_login_password: ""

- name: Check root login with current admin password
  community.mysql.mysql_query:
    login_db: "mysql"
    login_unix_socket: "{{ _mariadb_socket }}"
    login_user: "{{ mariadb_admin_user }}"
    login_password: "{{ mariadb_admin_login_password }}"
    config_file: /dev/null
    query: "SELECT 1"
  register: _mariadb_root_login_check
  changed_when: false
  ignore_errors: true
  when: mariadb_admin_login_password | length > 0

- name: Fail if current admin password is invalid
  ansible.builtin.fail:
    msg: >-
      Unable to connect as {{ mariadb_admin_user }} with
      mariadb_admin_login_password. Provide the correct current password
      or remove mariadb_admin_login_password to try other methods.
  when:
    - mariadb_admin_login_password | length > 0
    - _mariadb_root_login_check is defined
    - _mariadb_root_login_check.failed

- name: Set root login password fact (current password)
  ansible.builtin.set_fact:
    _mariadb_root_login_password: "{{ mariadb_admin_login_password }}"
  when:
    - mariadb_admin_login_password | length > 0
    - _mariadb_root_login_check is defined
    - not _mariadb_root_login_check.failed

- name: Check root login with desired password
  community.mysql.mysql_query:
    login_db: "mysql"
    login_unix_socket: "{{ _mariadb_socket }}"
    login_user: "{{ mariadb_admin_user }}"
    login_password: "{{ mariadb_admin_password }}"
    config_file: /dev/null
    query: "SELECT 1"
  register: _mariadb_root_login_check_new
  changed_when: false
  ignore_errors: true
  when:
    - mariadb_admin_login_password | length == 0
    - mariadb_admin_password | length > 0

- name: Set root login password fact (desired password works)
  ansible.builtin.set_fact:
    _mariadb_root_login_password: "{{ mariadb_admin_password }}"
  when:
    - mariadb_admin_login_password | length == 0
    - mariadb_admin_password | length > 0
    - _mariadb_root_login_check_new is defined
    - not _mariadb_root_login_check_new.failed

- name: Check root login without password
  community.mysql.mysql_query:
    login_db: "mysql"
    login_unix_socket: "{{ _mariadb_socket }}"
    login_user: "{{ mariadb_admin_user }}"
    config_file: /dev/null
    query: "SELECT 1"
  register: _mariadb_root_login_check_empty
  changed_when: false
  ignore_errors: true
  when:
    - mariadb_admin_login_password | length == 0
    - _mariadb_root_login_password | length == 0

- name: Fail if unable to connect as admin
  ansible.builtin.fail:
    msg: >-
      Unable to connect as {{ mariadb_admin_user }}. Set
      mariadb_admin_login_password to the current password or fix access.
  when:
    - mariadb_admin_login_password | length == 0
    - _mariadb_root_login_password | length == 0
    - _mariadb_root_login_check_empty is defined
    - _mariadb_root_login_check_empty.failed

- name: Get list of hosts for the anonymous user.
  community.mysql.mysql_query:
    login_db: "mysql"
    login_unix_socket: "{{ _mariadb_socket }}"
    login_user: "{{ mariadb_admin_user }}"
    login_password: >-
      {{ _mariadb_root_login_password
      if _mariadb_root_login_password | length > 0 else omit }}
    config_file: /dev/null
    query: SELECT Host FROM mysql.user WHERE User = %s
    positional_args:
      - ''
  register: _mariadb_anonymous_hosts

- name: Remove anonymous MariaDB users.
  community.mysql.mysql_query:
    login_db: "mysql"
    login_unix_socket: "{{ _mariadb_socket }}"
    login_user: "{{ mariadb_admin_user }}"
    login_password: >-
      {{ _mariadb_root_login_password
      if _mariadb_root_login_password | length > 0 else omit }}
    config_file: /dev/null
    query: DELETE FROM mysql.user WHERE User=%s AND Host=%s
    positional_args:
      - ''
      - "{{ item.Host }}"
  loop: "{{ _mariadb_anonymous_hosts.query_result | first }}"
  when:
    - not ansible_check_mode
    - _mariadb_anonymous_hosts.rowcount[0] != 0

- name: Get list of hosts for the root user.
  community.mysql.mysql_query:
    login_db: "mysql"
    login_unix_socket: "{{ _mariadb_socket }}"
    login_user: "{{ mariadb_admin_user }}"
    login_password: >-
      {{ _mariadb_root_login_password
      if _mariadb_root_login_password | length > 0 else omit }}
    config_file: /dev/null
    query: SELECT Host FROM mysql.user WHERE User = %s ORDER BY (Host='localhost') ASC
    positional_args:
      - "{{ mariadb_admin_user }}"
  register: _mariadb_root_hosts

- name: Disallow root login remotely
  community.mysql.mysql_user:
    name: "{{ mariadb_admin_user }}"
    login_unix_socket: "{{ _mariadb_socket }}"
    login_user: "{{ mariadb_admin_user }}"
    login_password: >-
      {{ _mariadb_root_login_password
      if _mariadb_root_login_password | length > 0 else omit }}
    config_file: /dev/null
    host: "{{ item.Host }}"
    priv: "*.*:ALL,GRANT"
    state: absent
  loop: '{{ _mariadb_root_hosts.query_result[0] | rejectattr("Host", "in", "localhost,::1,127.0.0.1") | list }}'
  when: not ansible_check_mode

- name: Update MariaDB root password for localhost root account
  community.mysql.mysql_user:
    name: "{{ mariadb_admin_user }}"
    password: "{{ mariadb_admin_password }}"
    login_unix_socket: "{{ _mariadb_socket }}"
    login_user: "{{ mariadb_admin_user }}"
    login_password: >-
      {{ _mariadb_root_login_password
      if _mariadb_root_login_password | length > 0 else omit }}
    config_file: /dev/null
    host: "localhost"
  register: _mariadb_root_password_update
  when:
    - not ansible_check_mode
    - _mariadb_root_hosts.rowcount[0] != 0
    - mariadb_admin_force_password_update

- name: Update root login password fact after rotation
  ansible.builtin.set_fact:
    _mariadb_root_login_password: "{{ mariadb_admin_password }}"
  when:
    - mariadb_admin_password | length > 0
    - _mariadb_root_password_update is defined
    - not _mariadb_root_password_update.skipped | default(false)

- name: Output results of updating mysql root password
  ansible.builtin.debug:
    var: _mariadb_root_password_update
  when: mariadb_debug

- name: Check root auth plugin
  community.mysql.mysql_query:
    login_db: "mysql"
    login_unix_socket: "{{ _mariadb_socket }}"
    login_user: "{{ mariadb_admin_user }}"
    login_password: >-
      {{ _mariadb_root_login_password
      if _mariadb_root_login_password | length > 0 else omit }}
    config_file: /dev/null
    query: "SELECT plugin FROM mysql.user WHERE User=%s AND Host='localhost' LIMIT 1"
    positional_args:
      - "{{ mariadb_admin_user }}"
  register: _mariadb_root_plugin
  when:
    - mariadb_disable_unix_socket_auth | bool

- name: Set root auth plugin fact
  ansible.builtin.set_fact:
    _mariadb_root_plugin_name: >-
      {{ _mariadb_root_plugin.query_result[0][0].plugin
      | default('', true) | lower }}
  when:
    - mariadb_disable_unix_socket_auth | bool
    - _mariadb_root_plugin.query_result | length > 0
    - _mariadb_root_plugin.query_result[0] | length > 0

- name: Disable unix_socket auth for root
  community.mysql.mysql_query:
    login_db: "mysql"
    login_unix_socket: "{{ _mariadb_socket }}"
    login_user: "{{ mariadb_admin_user }}"
    login_password: >-
      {{ _mariadb_root_login_password
      if _mariadb_root_login_password | length > 0 else omit }}
    config_file: /dev/null
    query: >-
      ALTER USER '{{ mariadb_admin_user }}'@'localhost'
      IDENTIFIED BY '{{ mariadb_admin_password | replace("'", "''") }}';
  when:
    - mariadb_disable_unix_socket_auth | bool
    - _mariadb_root_plugin_name | default('') in ['unix_socket', 'auth_socket']

- name: Ensure root .my.cnf is absent when disabled
  ansible.builtin.file:
    path: "{{ mariadb_admin_home }}/.my.cnf"
    state: absent
  when:
    - mariadb_admin_remove_mycnf | bool
    - not mariadb_admin_create_mycnf | bool

- name: Copy .my.cnf file with root password credentials.
  ansible.builtin.template:
    src: "root-my.cnf.j2"
    dest: "{{ mariadb_admin_home }}/.my.cnf"
    owner: root
    group: root
    mode: 0600
  when:
    - mariadb_admin_force_password_update
    - mariadb_admin_create_mycnf | bool

- name: Create dedicated admin user
  community.mysql.mysql_user:
    name: "{{ mariadb_admin_create_user_name }}"
    host: "{{ mariadb_admin_create_user_host }}"
    password: "{{ mariadb_admin_create_user_password }}"
    priv: "{{ mariadb_admin_create_user_priv }}"
    state: present
    login_unix_socket: "{{ _mariadb_socket }}"
    login_user: "{{ mariadb_admin_user }}"
    login_password: >-
      {{ _mariadb_root_login_password
      if _mariadb_root_login_password | length > 0 else omit }}
    config_file: /dev/null
  when:
    - mariadb_admin_create_user | bool
    - mariadb_admin_create_user_password | length > 0

- name: Remove MariaDB test database.
  community.mysql.mysql_db:
    name: test
    state: absent
    login_unix_socket: "{{ _mariadb_socket }}"
